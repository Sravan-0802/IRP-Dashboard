openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: IRP 2.0 Student Dashboard API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: student
    description: Student profile and progress
  - name: analytics
    description: Dashboard usage analytics
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /student:
    get:
      operationId: getStudent
      tags: [student]
      summary: Get student profile
      description: Returns the current student's profile information
      responses:
        "200":
          description: Student profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Student"

  /student/progress:
    get:
      operationId: getStudentProgress
      tags: [student]
      summary: Get student progress
      description: Returns MCQ and coding completion percentages per subject
      responses:
        "200":
          description: Student progress data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StudentProgress"

  /student/marks:
    get:
      operationId: getStudentMarks
      tags: [student]
      summary: Get student marks
      description: Returns student marks and scores across subjects
      responses:
        "200":
          description: Student marks
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SubjectMark"

  /student/assessments:
    get:
      operationId: getStudentAssessments
      tags: [student]
      summary: Get student assessment results
      description: Returns synced main assessment scores from Postgres
      responses:
        "200":
          description: Student assessment results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StudentAssessments"

  /student/activity:
    get:
      operationId: getStudentActivity
      tags: [student]
      summary: Get recent student activity
      description: Returns recent practice activity and streaks
      responses:
        "200":
          description: Recent activity
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StudentActivity"

  /student/contact:
    post:
      operationId: submitContactMessage
      tags: [student]
      summary: Submit a contact us message
      description: Stores a message from the student for the IRP team
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ContactMessageRequest"
      responses:
        "201":
          description: Message saved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContactMessageResponse"
        "400":
          description: Invalid message
        "401":
          description: Unauthorized

  /student/analytics/event:
    post:
      operationId: logDashboardAnalyticsEvent
      tags: [student]
      summary: Log a dashboard analytics event
      description: Records UI interaction events for internal analytics
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DashboardAnalyticsEventRequest"
      responses:
        "201":
          description: Event logged
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardAnalyticsEventResponse"
        "400":
          description: Invalid event type
        "401":
          description: Unauthorized

  /student/l1-registration:
    get:
      operationId: getL1Registration
      tags: [student]
      summary: Get L1 assessment slot registration
      description: Returns the current student's registration for the given cycle (stored in Postgres)
      parameters:
        - name: cycle
          in: query
          schema:
            type: integer
            default: 2
      responses:
        "200":
          description: Registration state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/L1RegistrationResponse"
        "401":
          description: Unauthorized
    post:
      operationId: submitL1Registration
      tags: [student]
      summary: Submit L1 assessment slot registration
      description: Saves slot registration and form answers to l1_cycle_registrations
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/L1RegistrationRequest"
      responses:
        "201":
          description: Registration saved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/L1RegistrationSubmitResponse"
        "400":
          description: Invalid registration
        "401":
          description: Unauthorized
    delete:
      operationId: deleteL1Registration
      tags: [student]
      summary: Delete L1 registration (dev only)
      description: Removes registration for local testing — not available in production
      parameters:
        - name: cycle
          in: query
          schema:
            type: integer
            default: 2
      responses:
        "200":
          description: Registration deleted
          content:
            application/json:
              schema:
                type: object
                required: [ok]
                properties:
                  ok:
                    type: boolean
        "401":
          description: Unauthorized
        "404":
          description: Not found

  /analytics/dashboard:
    get:
      operationId: getDashboardAnalytics
      tags: [analytics]
      summary: Get dashboard usage analytics
      description: Returns aggregate click and visit stats (requires admin API key)
      security:
        - ApiKeyAuth: []
      responses:
        "200":
          description: Analytics summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardAnalyticsSummary"
        "401":
          description: Unauthorized

components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: x-api-key

  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    Student:
      type: object
      required:
        - id
        - name
        - yog
        - level
        - email
        - avatar
        - registrationStatus
        - currentLevel
      properties:
        id:
          type: integer
        name:
          type: string
        yog:
          type: integer
          description: Year of graduation (2028 or 2029)
        level:
          type: string
          description: Current IRP level (Level 1, Level 2, Level 3)
        email:
          type: string
        avatar:
          type: string
        registrationStatus:
          type: string
          description: registered or pending
        currentLevel:
          type: integer
          description: Current level number (1, 2, or 3)

    SubjectProgress:
      type: object
      required:
        - subject
        - mcqCompleted
        - mcqTotal
        - codingCompleted
        - codingTotal
        - mcqPercentage
        - codingPercentage
      properties:
        subject:
          type: string
        mcqCompleted:
          type: integer
        mcqTotal:
          type: integer
        codingCompleted:
          type: integer
        codingTotal:
          type: integer
        mcqPercentage:
          type: number
        codingPercentage:
          type: number

    StudentProgress:
      type: object
      required:
        - overallMcqPercentage
        - overallCodingPercentage
        - subjects
        - streakDays
        - lastActiveDate
      properties:
        overallMcqPercentage:
          type: number
        overallCodingPercentage:
          type: number
        streakDays:
          type: integer
        lastActiveDate:
          type: string
        subjects:
          type: array
          items:
            $ref: "#/components/schemas/SubjectProgress"

    SubjectMark:
      type: object
      required:
        - id
        - subject
        - category
        - score
        - maxScore
        - percentage
        - assessmentType
        - date
      properties:
        id:
          type: integer
        subject:
          type: string
        category:
          type: string
          description: MCQ or Coding
        score:
          type: number
        maxScore:
          type: number
        percentage:
          type: number
        assessmentType:
          type: string
          description: Practice or Mock Assessment
        date:
          type: string

    AssessmentResult:
      type: object
      required:
        - organisationAssessmentId
        - assessmentTitle
        - level
        - mcqScore
        - mcqMax
        - mcqPct
        - codingScore
        - codingMax
        - codingPct
        - overallScore
        - overallMax
        - overallPct
        - hasWrittenAssessment
      properties:
        organisationAssessmentId:
          type: string
        assessmentTitle:
          type: string
        assessmentTag:
          type: string
        level:
          type: string
        cycle:
          type: string
        mcqScore:
          type: number
        mcqMax:
          type: number
        mcqPct:
          type: number
        codingScore:
          type: number
        codingMax:
          type: number
        codingPct:
          type: number
        overallScore:
          type: number
        overallMax:
          type: number
        overallPct:
          type: number
        hasWrittenAssessment:
          type: boolean
          description: True when assessment_user_score or section scores exist — the exam was attempted.

    StudentAssessments:
      type: object
      required:
        - assessments
      properties:
        assessments:
          type: array
          items:
            $ref: "#/components/schemas/AssessmentResult"

    StudentActivity:
      type: object
      required:
        - totalMcqSolved
        - totalCodingSolved
        - weeklyActivity
        - recentSessions
      properties:
        totalMcqSolved:
          type: integer
        totalCodingSolved:
          type: integer
        weeklyActivity:
          type: array
          items:
            $ref: "#/components/schemas/DayActivity"
        recentSessions:
          type: array
          items:
            $ref: "#/components/schemas/Session"

    DayActivity:
      type: object
      required:
        - day
        - mcq
        - coding
      properties:
        day:
          type: string
        mcq:
          type: integer
        coding:
          type: integer

    Session:
      type: object
      required:
        - id
        - subject
        - type
        - duration
        - date
        - questionsAttempted
      properties:
        id:
          type: integer
        subject:
          type: string
        type:
          type: string
        duration:
          type: integer
          description: Duration in minutes
        date:
          type: string
        questionsAttempted:
          type: integer

    ContactMessageRequest:
      type: object
      required:
        - message
      properties:
        message:
          type: string
          minLength: 1
          maxLength: 2000

    ContactMessageResponse:
      type: object
      required:
        - ok
        - id
      properties:
        ok:
          type: boolean
        id:
          type: integer

    DashboardAnalyticsEventRequest:
      type: object
      required:
        - eventType
      properties:
        eventType:
          type: string
          enum:
            - dashboard_visit
            - nav_dashboard
            - nav_assessment_calendar
            - feedback_open
            - contact_us_click

    DashboardAnalyticsEventResponse:
      type: object
      required:
        - ok
      properties:
        ok:
          type: boolean

    L1RegistrationRequest:
      type: object
      required:
        - availability
      properties:
        cycle:
          type: integer
          default: 2
        availability:
          type: string
          enum: [yes, no-not-prepared, no-conflict]
        slotId:
          type: string
        understandsGc:
          type: boolean
        willAttend:
          type: boolean
        unavailabilityReason:
          type: string
        notifyNextCycle:
          type: boolean

    L1Registration:
      type: object
      required:
        - id
        - academyUserId
        - cycle
        - level
        - assessmentDate
        - availability
        - submittedAt
      properties:
        id:
          type: integer
        academyUserId:
          type: string
        userName:
          type: string
          nullable: true
        cycle:
          type: integer
        level:
          type: integer
        assessmentDate:
          type: string
        availability:
          type: string
        slotId:
          type: string
        slotLabel:
          type: string
        understandsGc:
          type: boolean
        willAttend:
          type: boolean
        unavailabilityReason:
          type: string
        notifyNextCycle:
          type: boolean
        submittedAt:
          type: string

    L1RegistrationResponse:
      type: object
      required:
        - registration
      properties:
        registration:
          nullable: true
          allOf:
            - $ref: "#/components/schemas/L1Registration"

    L1RegistrationSubmitResponse:
      type: object
      required:
        - registration
      properties:
        registration:
          $ref: "#/components/schemas/L1Registration"

    DashboardAnalyticsMetric:
      type: object
      required:
        - eventType
        - label
        - totalClicks
        - uniqueUsers
      properties:
        eventType:
          type: string
        label:
          type: string
        totalClicks:
          type: integer
        uniqueUsers:
          type: integer

    DashboardAnalyticsDailyMetric:
      type: object
      required:
        - eventType
        - clicks
        - users
      properties:
        eventType:
          type: string
        clicks:
          type: integer
        users:
          type: integer

    DashboardAnalyticsDailyRow:
      type: object
      required:
        - date
        - metrics
      properties:
        date:
          type: string
        metrics:
          type: array
          items:
            $ref: "#/components/schemas/DashboardAnalyticsDailyMetric"

    DashboardAnalyticsSummary:
      type: object
      required:
        - trackingSince
        - generatedAt
        - events
        - daily
        - l1Registrations
        - l1RegistrationCount
      properties:
        trackingSince:
          type: string
          nullable: true
        generatedAt:
          type: string
        events:
          type: array
          items:
            $ref: "#/components/schemas/DashboardAnalyticsMetric"
        daily:
          type: array
          items:
            $ref: "#/components/schemas/DashboardAnalyticsDailyRow"
        l1Registrations:
          type: array
          items:
            $ref: "#/components/schemas/L1Registration"
        l1RegistrationCount:
          type: integer
